services:
  syncthing:
    container_name: syncthing-sean
    hostname: syncthing-sean
    image: docker.io/syncthing/syncthing:latest@sha256:1914deddb3be7808579f3ce0eb4a1c493daa2f01e8953c2d73ba52ee2b1b418a
    environment:
      UID: 568
      GID: 568
      GROUP_ID: 568
      HOME: /var/syncthing
      PGID: 568
      PUID: 568
      STGUIADDRESS: 0.0.0.0:20910
      STNOUPGRADE: true
      UMASK: 002
      UMASK_SET: 002
      USER_ID: 568
      TZ: US/Eastern
    volumes:
      - /mnt/main/homes/sean:/mnt/homes/sean
      - /mnt/apps/syncthing-sean/config:/var/syncthing
    restart: unless-stopped
    network_mode: host
    healthcheck:
      test: curl -fkLsS -m 2 127.0.0.1:20910/rest/noauth/health | grep -o --color=never OK || exit 1
      interval: 1m
      timeout: 10s
      retries: 3
